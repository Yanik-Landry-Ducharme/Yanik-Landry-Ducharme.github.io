<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combiner Bobineuse</title>
    <style>
        body {
            background-color: #000;
            color: #f8f8f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .header {
            border-top: 4px solid #F15A22;
            padding-top: 10px;
            margin-bottom: 30px;
            text-align: right;
        }
        
        .header h1 {
            color: #F15A22;
            text-transform: uppercase;
            font-size: 24px;
            margin: 0;
        }
        
        .spacer {
            height: 1px;
            background-color: #F15A22;
            width: 100%;
            margin-top: 5px;
        }
        
        .section-title {
            color: #f15a22; /* Même orange */
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .panel {
            background-color: #1a1c1e;
            border: 1px solid #333;
            border-top: 4px solid #F15A22;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }

        .panel img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .caption {
            font-size: 14px;
            color: #c7cdd1;
            margin: 0;
            margin-top: auto;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>IANIK LANDRY-DUCHARME</h1>
        <div class="spacer"></div>
    </div>
    
    <h1 class="section-title">🔄 Bobineuse de rubans supraconducteurs</h1>
    
    <div class="grid">
        <div class="panel">
            <img src="https://Yanik-Landry-Ducharme.github.io/Dossier_Senior/Bobineuse1.jpg" alt="Bobineuse 1">
            <p class="caption">Bobineuse 1 - Vue d'ensemble du cône de guidage</p>
        </div>
        <div class="panel">
            <img src="https://Yanik-Landry-Ducharme.github.io/Dossier_Senior/Bobineuse2.jpg" alt="Bobineuse 2">
            <p class="caption">Bobineuse 2 - Structure latérale et motorisation</p>
        </div>
    </div>

</body>
</html>
